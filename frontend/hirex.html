<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HIREX – AI Interview Platform</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
/* ===== RESET ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased;transition:background 0.3s,color 0.3s}
body.dark{background:#070b1f;color:#fff}
body.light{background:#eef0ff;color:#0f172a}
a{text-decoration:none;color:inherit}
button{cursor:pointer;font-family:inherit;border:none}
input{font-family:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(91,95,255,0.4);border-radius:3px}

/* ===== KEYFRAMES ===== */
@keyframes slideUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes scaleIn{from{opacity:0;transform:scale(0.92)}to{opacity:1;transform:scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
@keyframes floatR{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(14px) rotate(2deg)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
@keyframes progressFill{from{stroke-dashoffset:283}to{stroke-dashoffset:0}}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}

/* ===== UTILITY ===== */
.anim-su{animation:slideUp .65s ease both}
.anim-fi{animation:fadeIn .5s ease both}
.anim-si{animation:scaleIn .45s ease both}
.gradient-text{background:linear-gradient(135deg,#7c6ff7,#9333ea);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gradient-text-blue{background:linear-gradient(135deg,#5b5fff,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gradient-text-green{background:linear-gradient(135deg,#10b981,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.gradient-text-head{background:linear-gradient(135deg,#818cf8 0%,#c084fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ===== CARD ===== */
.card-dark{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:14px;backdrop-filter:blur(12px)}
.card-light{background:rgba(255,255,255,.85);border:1px solid rgba(79,70,229,.12);border-radius:14px}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 28px;border-radius:13px;font-size:15px;font-weight:600;border:none;cursor:pointer;transition:all .22s ease;white-space:nowrap}
.btn-primary{background:linear-gradient(135deg,#5b5fff 0%,#9333ea 100%);color:#fff;box-shadow:0 4px 20px rgba(91,95,255,.38)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(91,95,255,.5)}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;transform:none}
.btn-outline-white{background:transparent;color:#fff;border:1.5px solid rgba(255,255,255,.28);backdrop-filter:blur(8px)}
.btn-outline-white:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.5);transform:translateY(-2px)}
.btn-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff;box-shadow:0 4px 18px rgba(16,185,129,.3)}
.btn-green:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(16,185,129,.45)}
.btn-white-form{background:#fff;color:#4f46e5;font-weight:700;border:2px solid #e2e8f0}
.btn-white-form:hover{border-color:#c7d2fe;background:#f0f2ff;transform:translateY(-1px)}

/* ===== INPUTS ===== */
.input-dark{width:100%;padding:13px 16px 13px 42px;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:11px;color:#fff;font-size:14px;outline:none;transition:all .2s}
.input-dark::placeholder{color:rgba(255,255,255,.3)}
.input-dark:focus{border-color:#5b5fff;background:rgba(91,95,255,.08);box-shadow:0 0 0 3px rgba(91,95,255,.15)}
.input-light{width:100%;padding:13px 16px 13px 42px;background:#f8faff;border:1.5px solid #e2e8f0;border-radius:11px;color:#0f172a;font-size:14px;outline:none;transition:all .2s}
.input-light::placeholder{color:#94a3b8}
.input-light:focus{border-color:#5b5fff;box-shadow:0 0 0 3px rgba(91,95,255,.1)}

/* ===== SIDEBAR ===== */
.sidebar{width:236px;min-height:100vh;background:linear-gradient(180deg,#0a0e28 0%,#0d1340 100%);border-right:1px solid rgba(255,255,255,.07);display:flex;flex-direction:column;flex-shrink:0;position:sticky;top:0;overflow:hidden}
.nav-item{width:100%;display:flex;align-items:center;gap:11px;padding:11px 20px;background:transparent;border-left:3px solid transparent;border:none;color:rgba(255,255,255,.5);font-size:13.5px;font-weight:400;cursor:pointer;transition:all .2s;text-align:left}
.nav-item:hover{background:rgba(255,255,255,.04);color:rgba(255,255,255,.8)}
.nav-item.active{background:linear-gradient(90deg,rgba(91,95,255,.22),rgba(91,95,255,.05));border-left:3px solid #5b5fff;color:#fff;font-weight:600}

/* ===== TOPBAR ===== */
.topbar{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(10,14,40,.85);backdrop-filter:blur(12px);position:sticky;top:0;z-index:50}

/* ===== PROGRESS RING ===== */
.progress-ring circle{transition:stroke-dashoffset 1.2s ease}

/* ===== SCROLLABLE MAIN ===== */
.dash-main{flex:1;overflow-y:auto;min-width:0}

/* ===== ROUND CARD HOVER ===== */
.round-card{transition:transform .22s ease,box-shadow .22s ease}
.round-card:hover{transform:translateY(-5px)}

/* ===== THEME TOGGLE ===== */
.theme-pill{display:flex;align-items:center;gap:4px;padding:6px 8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:50px;cursor:pointer;transition:background .2s}
.theme-pill:hover{background:rgba(255,255,255,.13)}
.theme-btn{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;transition:all .22s}
.divider-thin{height:1px;background:rgba(255,255,255,.07);width:100%}

/* ===== OTP INPUT ===== */
.otp-input{width:52px;height:58px;text-align:center;font-size:22px;font-weight:700;background:rgba(255,255,255,.05);border-radius:12px;border:2px solid rgba(255,255,255,.1);color:#fff;outline:none;transition:all .2s}
.otp-input:focus,.otp-input.filled{border-color:#5b5fff;box-shadow:0 0 14px rgba(91,95,255,.3);background:rgba(91,95,255,.08)}

/* ===== STAT BAR ===== */
.stat-bar-fill{height:100%;border-radius:4px;transition:width 1.2s ease}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
  .two-col-layout{flex-direction:column!important}
  .sidebar{width:200px}
  .hide-sm{display:none!important}
}
@media(max-width:640px){
  .sidebar{display:none}
  .rounds-grid{grid-template-columns:repeat(2,1fr)!important}
}
</style>
</head>
<body class="dark">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ════════════════════════════════════════════
   HIREX LOGO SVG
════════════════════════════════════════════ */
const HirexIcon = ({ size = 52 }) => (
  <svg width={size} height={size * 1.18} viewBox="0 0 52 62" fill="none">
    <defs>
      <linearGradient id="hL" x1="0" y1="0" x2="0" y2="1"><stop stopColor="#7c6ff7"/><stop offset="1" stopColor="#4f46e5"/></linearGradient>
      <linearGradient id="hR" x1="0" y1="0" x2="0" y2="1"><stop stopColor="#9333ea"/><stop offset="1" stopColor="#7c3aed"/></linearGradient>
      <linearGradient id="hB" x1="0" y1="0" x2="1" y2="0"><stop stopColor="#6366f1"/><stop offset="1" stopColor="#8b5cf6"/></linearGradient>
    </defs>
    <rect x="0" y="0" width="17" height="62" rx="3" fill="url(#hL)"/>
    <rect x="35" y="0" width="17" height="62" rx="3" fill="url(#hR)"/>
    <rect x="17" y="22" width="18" height="18" rx="2" fill="url(#hB)"/>
  </svg>
);

const HirexBrand = ({ size = 'md' }) => {
  const sizes = { sm:[32,20,9], md:[46,26,10], lg:[62,36,12] };
  const [ic, tx, sub] = sizes[size] || sizes.md;
  return (
    <div style={{display:'flex',alignItems:'center',gap:size==='sm'?8:12}}>
      <HirexIcon size={ic}/>
      <div>
        <div style={{fontFamily:"'Space Grotesk','Inter',sans-serif",fontSize:tx,fontWeight:800,color:'#fff',letterSpacing:.5,lineHeight:1}}>HIREX</div>
        <div style={{fontSize:sub,color:'rgba(255,255,255,.45)',letterSpacing:'0.14em',marginTop:2,textTransform:'uppercase',fontWeight:500}}>AI Interview Platform</div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════
   ANIMATED CANVAS BACKGROUND
════════════════════════════════════════════ */
const AnimatedBg = () => {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    const ctx = canvas.getContext('2d');
    let animId, t = 0;
    const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);
    const pts = Array.from({length:70},(_,i)=>({x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,r:Math.random()*1.8+.4,vx:(Math.random()-.5)*.28,vy:(Math.random()-.5)*.28,op:Math.random()*.5+.15,h:i<35?230+Math.random()*30:268+Math.random()*28}));
    const draw = () => {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      t+=.007;
      // left glow blobs
      for(let i=0;i<4;i++){
        const wx=canvas.width*.14+Math.cos(t*.7+i)*.55*60,wy=canvas.height*.5+Math.sin(t+i*1.2)*115;
        const g=ctx.createRadialGradient(wx,wy,0,wx,wy,270-i*38);
        g.addColorStop(0,`rgba(79,91,255,${.16-i*.028})`);g.addColorStop(.6,`rgba(99,102,241,${.06-i*.01})`);g.addColorStop(1,'transparent');
        ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(wx,wy,270-i*38,195-i*28,Math.sin(t*.28)*.4,0,Math.PI*2);ctx.fill();
      }
      // wave lines left
      for(let w=0;w<5;w++){
        ctx.beginPath();ctx.strokeStyle=`rgba(79,91,255,${.1-w*.016})`;ctx.lineWidth=1.4-w*.18;
        for(let x=0;x<canvas.width*.52;x+=4){
          const y=canvas.height*(.28+w*.12)+Math.sin(x*.008+t+w)*50+Math.cos(x*.005+t*.7)*28;
          x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      // right glow blobs
      for(let i=0;i<3;i++){
        const wx=canvas.width*.83+Math.cos(t*.6+i*.8)*.5*48,wy=canvas.height*.44+Math.sin(t*.8+i*1.5)*98;
        const g=ctx.createRadialGradient(wx,wy,0,wx,wy,240-i*48);
        g.addColorStop(0,`rgba(147,51,234,${.18-i*.036})`);g.addColorStop(.5,`rgba(124,58,237,${.07-i*.018})`);g.addColorStop(1,'transparent');
        ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(wx,wy,240-i*48,172-i*28,Math.cos(t*.38)*.45,0,Math.PI*2);ctx.fill();
      }
      // wave lines right
      for(let w=0;w<4;w++){
        ctx.beginPath();ctx.strokeStyle=`rgba(147,51,234,${.09-w*.018})`;ctx.lineWidth=1.1;
        for(let x=Math.round(canvas.width*.5);x<canvas.width+20;x+=4){
          const y=canvas.height*(.33+w*.12)+Math.sin(x*.007-t+w*.8)*52+Math.cos(x*.004-t*.58)*24;
          x===Math.round(canvas.width*.5)?ctx.moveTo(x,y):ctx.lineTo(x,y);
        }
        ctx.stroke();
      }
      // particles
      pts.forEach(p=>{
        p.x+=p.vx;p.y+=p.vy;
        if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;
        if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;
        const osc=Math.sin(t*2+p.x*.01)*.18+p.op;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=`hsla(${p.h},78%,68%,${Math.max(0,osc)})`;ctx.fill();
      });
      animId=requestAnimationFrame(draw);
    };
    draw();
    return()=>{cancelAnimationFrame(animId);window.removeEventListener('resize',resize);};
  },[]);
  return <canvas ref={canvasRef} style={{position:'absolute',inset:0,zIndex:0,pointerEvents:'none'}}/>;
};

/* ════════════════════════════════════════════
   THEME TOGGLE
════════════════════════════════════════════ */
const ThemeToggle = ({ theme, toggle }) => (
  <div className="theme-pill" onClick={toggle}>
    <button className="theme-btn" style={{background:theme==='dark'?'rgba(255,255,255,.9)':'transparent',color:theme==='dark'?'#f59e0b':'rgba(255,255,255,.4)'}}>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <span style={{color:'rgba(255,255,255,.3)',fontSize:13}}>|</span>
    <button className="theme-btn" style={{background:theme==='light'?'rgba(79,70,229,.85)':'transparent',color:theme==='light'?'#fff':'rgba(255,255,255,.4)'}}>
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
  </div>
);

/* ════════════════════════════════════════════
   1. LANDING PAGE
════════════════════════════════════════════ */
const LandingPage = ({ navigate, theme, toggleTheme }) => {
  const features = [
    {icon:'🎯',title:'AI-Powered Assessments',desc:'Smart evaluation across aptitude, coding, typing, and interview rounds with real-time analysis.'},
    {icon:'📊',title:'Insightful Reports',desc:'Detailed performance analytics and comparison dashboards for smarter hiring decisions.'},
    {icon:'🔒',title:'Anti-Cheat Monitoring',desc:'Face detection, tab-switching alerts, eye tracking and background noise detection.'},
    {icon:'⚡',title:'Instant Results',desc:'Auto-evaluated scores published instantly after each round with transparent criteria.'},
  ];
  return (
    <div style={{minHeight:'100vh',position:'relative',overflow:'hidden',background:'linear-gradient(135deg,#070b1f 0%,#0d1140 50%,#0a0820 100%)',display:'flex',flexDirection:'column',alignItems:'center'}}>
      <AnimatedBg/>
      <div style={{position:'absolute',top:24,right:28,zIndex:10}}><ThemeToggle theme={theme} toggle={toggleTheme}/></div>

      {/* Hero */}
      <div className="anim-su" style={{position:'relative',zIndex:5,textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',padding:'120px 20px 60px',gap:0}}>
        <div style={{marginBottom:18,filter:'drop-shadow(0 0 40px rgba(91,95,255,.5))'}}>
          <HirexIcon size={92}/>
        </div>
        <h1 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:'clamp(54px,9vw,92px)',fontWeight:900,color:'#fff',letterSpacing:5,lineHeight:1,marginBottom:8,textShadow:'0 0 60px rgba(91,95,255,.4)'}}>
          HIREX
        </h1>
        <p style={{fontSize:'clamp(10px,1.5vw,13px)',fontWeight:600,letterSpacing:'0.38em',color:'rgba(255,255,255,.5)',textTransform:'uppercase',marginBottom:14}}>
          AI &nbsp; INTERVIEW &nbsp; PLATFORM
        </p>
        <div style={{height:2,width:80,background:'linear-gradient(90deg,#5b5fff,#9333ea)',borderRadius:2,marginBottom:18}}/>
        <p style={{fontSize:'clamp(16px,2.2vw,22px)',color:'rgba(255,255,255,.75)',fontWeight:400,marginBottom:44,letterSpacing:.3}}>
          Smarter Interviews. Better Hiring.
        </p>
        <div style={{display:'flex',gap:16,flexWrap:'wrap',justifyContent:'center'}}>
          <button className="btn btn-primary" onClick={()=>navigate('auth')} style={{minWidth:205,fontSize:16,padding:'15px 36px'}}>
            Get Started
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
          <button className="btn btn-outline-white" style={{minWidth:178,fontSize:16,padding:'15px 36px'}} onClick={()=>document.getElementById('feat')?.scrollIntoView({behavior:'smooth'})}>
            Learn More
          </button>
        </div>
      </div>

      {/* Features */}
      <div id="feat" style={{position:'relative',zIndex:5,width:'100%',maxWidth:1100,padding:'0 24px 80px',display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:18}}>
        {features.map((f,i)=>(
          <div key={i} className="card-dark anim-su" style={{padding:'26px 22px',animationDelay:`${.15+i*.08}s`,animationFillMode:'both'}}>
            <div style={{fontSize:30,marginBottom:10}}>{f.icon}</div>
            <h3 style={{fontSize:15,fontWeight:700,marginBottom:7,color:'#fff'}}>{f.title}</h3>
            <p style={{fontSize:13,color:'rgba(255,255,255,.5)',lineHeight:1.65}}>{f.desc}</p>
          </div>
        ))}
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════
   2. AUTH PAGE (Login / Sign Up)
════════════════════════════════════════════ */
const AuthPage = ({ navigate, theme, toggleTheme }) => {
  const [mode, setMode] = useState('login');
  const [form, setForm] = useState({name:'',email:'',password:'',confirm:''});
  const [showPw, setShowPw] = useState(false);
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const submit = async (e) => {
    e.preventDefault(); setErr('');
    if(mode==='signup' && form.password!==form.confirm){setErr('Passwords do not match.');return;}
    setLoading(true);
    await new Promise(r=>setTimeout(r,900));
    setLoading(false);
    navigate('verify', {email:form.email});
  };
  return (
    <div style={{minHeight:'100vh',position:'relative',background:'linear-gradient(135deg,#070b1f 0%,#0d1140 55%,#0a0820 100%)',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
      <AnimatedBg/>
      <div style={{position:'absolute',top:24,left:28,zIndex:10,cursor:'pointer'}} onClick={()=>navigate('landing')}><HirexBrand size="sm"/></div>
      <div style={{position:'absolute',top:24,right:28,zIndex:10}}><ThemeToggle theme={theme} toggle={toggleTheme}/></div>

      <div className="card-dark anim-si" style={{position:'relative',zIndex:5,width:'100%',maxWidth:455,padding:'38px 34px',margin:'0 20px'}}>
        {/* Tab */}
        <div style={{display:'flex',background:'rgba(255,255,255,.05)',borderRadius:11,padding:4,marginBottom:30}}>
          {['login','signup'].map(m=>(
            <button key={m} onClick={()=>{setMode(m);setErr('');}} style={{flex:1,padding:'10px',borderRadius:8,border:'none',fontWeight:600,fontSize:14,background:mode===m?'linear-gradient(135deg,#5b5fff,#9333ea)':'transparent',color:mode===m?'#fff':'rgba(255,255,255,.45)',transition:'all .22s',cursor:'pointer'}}>
              {m==='login'?'Login':'Sign Up'}
            </button>
          ))}
        </div>

        <h2 style={{fontSize:22,fontWeight:800,marginBottom:5}}>{mode==='login'?'Welcome back! 👋':'Create Account'}</h2>
        <p style={{fontSize:13.5,color:'rgba(255,255,255,.45)',marginBottom:26}}>{mode==='login'?'Login to continue your journey.':'Join HIREX and start your career journey.'}</p>

        <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
          {mode==='signup'&&(
            <div>
              <label style={{fontSize:12.5,color:'rgba(255,255,255,.5)',fontWeight:500,display:'block',marginBottom:6}}>Full Name</label>
              <div style={{position:'relative'}}>
                <span style={{position:'absolute',left:13,top:'50%',transform:'translateY(-50%)',color:'rgba(255,255,255,.25)'}}><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
                <input className="input-dark" type="text" placeholder="Your full name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} required/>
              </div>
            </div>
          )}
          <div>
            <label style={{fontSize:12.5,color:'rgba(255,255,255,.5)',fontWeight:500,display:'block',marginBottom:6}}>Email Address</label>
            <div style={{position:'relative'}}>

════════════════════════════════════════════ */
const AptitudeTestPage = ({ onBack }) => {
  const questions = [
    {id:1,q:"A train travels 120 km in 2 hours. What is its speed in km/h?",opts:["50","60","70","80"],ans:1},
    {id:2,q:"What is 35% of 480?",opts:["168","156","172","160"],ans:0},
    {id:3,q:"A can do a work in 12 days, B in 18 days. How many days together?",opts:["7.2","6.5","6","8"],ans:0},
    {id:4,q:"If 8 workers complete a job in 15 days, how many days for 12 workers?",opts:["8","10","12","9"],ans:1},
    {id:5,q:"Find the ratio: 0.25 : 0.75",opts:["1:2","1:3","2:3","1:4"],ans:1},
    {id:6,q:"Simple interest on ₹5000 at 8% per annum for 3 years?",opts:["₹1200","₹1100","₹1300","₹1500"],ans:0},
    {id:7,q:"A shopkeeper buys an item for ₹400 and sells at ₹480. Profit %?",opts:["15%","18%","20%","25%"],ans:2},
    {id:8,q:"Find HCF of 36 and 48.",opts:["6","12","8","18"],ans:1},
    {id:9,q:"Area of a rectangle: length 18m, breadth 12m?",opts:["200 m²","216 m²","180 m²","210 m²"],ans:1},
    {id:10,q:"Next number in series: 3, 6, 12, 24, ?",opts:["36","42","48","30"],ans:2},
  ];
  const [cur, setCur] = useState(0);
  const [selected, setSelected] = useState({});
  const [submitted, setSubmitted] = useState(false);
  const [timeLeft, setTimeLeft] = useState(3600);
  useEffect(()=>{
    if(submitted) return;
    const t = setInterval(()=>setTimeLeft(v=>v>0?v-1:0),1000);
    return()=>clearInterval(t);
  },[submitted]);
  const fmt = s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const score = questions.filter(q=>selected[q.id]===q.ans).length;
  if(submitted) return (
    <div style={{padding:'40px',maxWidth:700,margin:'0 auto',textAlign:'center'}}>
      <div style={{fontSize:64,marginBottom:12}}>{score>=6?'🎉':'😊'}</div>
      <h2 style={{fontSize:26,fontWeight:800,marginBottom:8}}>Aptitude Test Completed!</h2>
      <div style={{fontSize:52,fontWeight:900,background:'linear-gradient(135deg,#818cf8,#c084fc)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',margin:'16px 0'}}>{score*10}%</div>
      <p style={{color:'rgba(255,255,255,.5)',marginBottom:8}}>You answered <strong style={{color:'#818cf8'}}>{score}</strong> out of <strong style={{color:'#818cf8'}}>{questions.length}</strong> correctly</p>
      <p style={{color:score>=6?'#34d399':'#f59e0b',fontWeight:700,marginBottom:28,fontSize:15}}>{score>=6?'✅ Passed! You cleared the Aptitude Round.':'⚠️ Below passing score (60%). Better luck next time.'}</p>
      <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:8,marginBottom:28}}>
        {questions.map((q,i)=>{
          const picked=selected[q.id]; const correct=picked===q.ans;
          return <div key={i} style={{padding:'10px 6px',borderRadius:9,background:picked===undefined?'rgba(255,255,255,.06)':correct?'rgba(52,211,153,.15)':'rgba(239,68,68,.15)',border:`1px solid ${picked===undefined?'rgba(255,255,255,.1)':correct?'rgba(52,211,153,.4)':'rgba(239,68,68,.4)'}`,textAlign:'center'}}>
            <div style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.5)',marginBottom:4}}>Q{i+1}</div>
            <div style={{fontSize:16}}>{picked===undefined?'—':correct?'✅':'❌'}</div>
          </div>;
        })}
      </div>
      <button className="btn btn-primary" onClick={onBack} style={{minWidth:200}}>← Back to Rounds</button>
    </div>
  );
  const q = questions[cur];
  return (
    <div style={{padding:'28px 24px',maxWidth:860,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22}}>
        <div>
          <h2 style={{fontSize:20,fontWeight:800,marginBottom:3}}>🧠 Aptitude Test</h2>
          <p style={{color:'rgba(255,255,255,.45)',fontSize:13}}>Question {cur+1} of {questions.length}</p>
        </div>
        <div style={{display:'flex',gap:14,alignItems:'center'}}>
          <div style={{padding:'9px 18px',background:timeLeft<300?'rgba(239,68,68,.15)':'rgba(255,255,255,.07)',border:`1px solid ${timeLeft<300?'rgba(239,68,68,.4)':'rgba(255,255,255,.12)'}`,borderRadius:10,fontWeight:800,fontSize:18,color:timeLeft<300?'#f87171':'#818cf8',fontVariantNumeric:'tabular-nums'}}>⏱ {fmt(timeLeft)}</div>
          <button className="btn btn-outline-white" style={{padding:'9px 16px',fontSize:13}} onClick={onBack}>✕ Exit</button>
        </div>
      </div>
      <div style={{height:6,background:'rgba(255,255,255,.07)',borderRadius:3,marginBottom:26,overflow:'hidden'}}>
        <div style={{height:'100%',width:`${((cur+1)/questions.length)*100}%`,background:'linear-gradient(90deg,#818cf8,#c084fc)',borderRadius:3,transition:'width .4s'}}/>
      </div>
      <div className="card-dark" style={{padding:'28px',marginBottom:20}}>
        <div style={{fontSize:12,fontWeight:700,color:'#818cf8',letterSpacing:'.08em',marginBottom:12}}>QUESTION {cur+1}</div>
        <p style={{fontSize:17,fontWeight:600,lineHeight:1.6,marginBottom:28}}>{q.q}</p>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {q.opts.map((opt,i)=>(
            <button key={i} onClick={()=>setSelected({...selected,[q.id]:i})}
              style={{padding:'14px 18px',borderRadius:11,border:`2px solid ${selected[q.id]===i?'#818cf8':'rgba(255,255,255,.1)'}`,background:selected[q.id]===i?'rgba(129,140,248,.15)':'rgba(255,255,255,.03)',color:selected[q.id]===i?'#c4b5fd':'rgba(255,255,255,.8)',fontWeight:selected[q.id]===i?700:400,fontSize:14,cursor:'pointer',textAlign:'left',transition:'all .18s',display:'flex',alignItems:'center',gap:10}}>
              <span style={{width:24,height:24,borderRadius:'50%',border:`2px solid ${selected[q.id]===i?'#818cf8':'rgba(255,255,255,.2)'}`,background:selected[q.id]===i?'#818cf8':'transparent',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'white',flexShrink:0}}>{['A','B','C','D'][i]}</span>
              {opt}
            </button>
          ))}
        </div>
      </div>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          {questions.map((_,i)=>(
            <button key={i} onClick={()=>setCur(i)} style={{width:34,height:34,borderRadius:7,border:`2px solid ${cur===i?'#818cf8':selected[questions[i].id]!==undefined?'rgba(52,211,153,.5)':'rgba(255,255,255,.15)'}`,background:cur===i?'rgba(129,140,248,.2)':selected[questions[i].id]!==undefined?'rgba(52,211,153,.1)':'transparent',color:cur===i?'#c4b5fd':selected[questions[i].id]!==undefined?'#34d399':'rgba(255,255,255,.4)',fontSize:12,fontWeight:700,cursor:'pointer'}}>{i+1}</button>
          ))}
        </div>
        <div style={{display:'flex',gap:10}}>
          {cur>0&&<button className="btn btn-outline-white" style={{padding:'10px 20px',fontSize:13}} onClick={()=>setCur(c=>c-1)}>← Prev</button>}
          {cur<questions.length-1
            ?<button className="btn btn-primary" style={{padding:'10px 20px',fontSize:13}} onClick={()=>setCur(c=>c+1)}>Next →</button>
            :<button className="btn btn-primary" style={{padding:'10px 20px',fontSize:13,background:'linear-gradient(135deg,#10b981,#059669)'}} onClick={()=>setSubmitted(true)}>Submit Test ✓</button>}
        </div>
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════
   CODING TEST PAGE
════════════════════════════════════════════ */
const CodingTestPage = ({ onBack }) => {
  const problems = [
    {id:1,title:'Two Sum',diff:'Easy',color:'#34d399',desc:'Given an array of integers nums and an integer target, return the indices of the two numbers such that they add up to target. You may assume that each input would have exactly one solution, and you may not use the same element twice.',examples:[{input:'nums = [2,7,11,15], target = 9',output:'[0,1]',exp:'nums[0] + nums[1] = 2 + 7 = 9'},{input:'nums = [3,2,4], target = 6',output:'[1,2]',exp:'nums[1] + nums[2] = 2 + 4 = 6'}],constraints:['2 ≤ nums.length ≤ 10⁴','−10⁹ ≤ nums[i] ≤ 10⁹','Only one valid answer exists.'],starter:'def twoSum(nums, target):\n    # Write your solution here\n    pass'},
    {id:2,title:'Palindrome Check',diff:'Easy',color:'#60a5fa',desc:'Given a string s, return true if it is a palindrome, considering only alphanumeric characters and ignoring cases. Otherwise, return false.',examples:[{input:"s = 'A man a plan a canal Panama'",output:'true',exp:'After cleaning: "amanaplanacanalpanama" is a palindrome.'},{input:"s = 'race a car'",output:'false',exp:'"raceacar" is not a palindrome.'}],constraints:['1 ≤ s.length ≤ 2×10⁵','s consists only of printable ASCII characters.'],starter:'def isPalindrome(s):\n    # Write your solution here\n    pass'},
  ];
  const [prob,setProb]=useState(0);const [code,setCode]=useState({0:problems[0].starter,1:problems[1].starter});const [results,setResults]=useState({});const [running,setRunning]=useState(false);const [timeLeft,setTimeLeft]=useState(5400);const [done,setDone]=useState(false);
  useEffect(()=>{if(done)return;const t=setInterval(()=>setTimeLeft(v=>v>0?v-1:0),1000);return()=>clearInterval(t);},[done]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
  const runCode=async()=>{setRunning(true);await new Promise(r=>setTimeout(r,1200));setResults({...results,[prob]:{passed:true,output:'[0, 1]',time:'12ms',memory:'14.2 MB'}});setRunning(false);};
  const p=problems[prob];
  return(
    <div style={{padding:'20px 24px',maxWidth:1100,margin:'0 auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div><h2 style={{fontSize:20,fontWeight:800,marginBottom:3}}>⌨️ Coding Test</h2><p style={{color:'rgba(255,255,255,.45)',fontSize:13}}>2 Problems · 90 Minutes</p></div>
        <div style={{display:'flex',gap:12,alignItems:'center'}}>
          <div style={{padding:'9px 18px',background:'rgba(52,211,153,.1)',border:'1px solid rgba(52,211,153,.3)',borderRadius:10,fontWeight:800,fontSize:18,color:'#34d399'}}>⏱ {fmt(timeLeft)}</div>
          <button className="btn btn-outline-white" style={{padding:'9px 16px',fontSize:13}} onClick={onBack}>✕ Exit</button>
        </div>
      </div>
      <div style={{display:'flex',gap:10,marginBottom:16}}>
        {problems.map((pr,i)=>(
          <button key={i} onClick={()=>setProb(i)} style={{padding:'9px 20px',borderRadius:9,border:`2px solid ${prob===i?pr.color:'rgba(255,255,255,.12)'}`,background:prob===i?`${pr.color}18`:'rgba(255,255,255,.04)',color:prob===i?pr.color:'rgba(255,255,255,.5)',fontWeight:700,fontSize:13,cursor:'pointer',display:'flex',alignItems:'center',gap:7}}>
            {results[i]&&<span style={{color:'#34d399'}}>✓</span>} {i+1}. {pr.title}
            <span style={{fontSize:10,padding:'2px 7px',borderRadius:4,background:`${pr.color}22`,color:pr.color,fontWeight:700}}>{pr.diff}</span>
          </button>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,height:'70vh'}}>
        {/* Problem */}
        <div className="card-dark" style={{padding:'22px',overflowY:'auto'}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
            <h3 style={{fontSize:17,fontWeight:800}}>{prob+1}. {p.title}</h3>
            <span style={{fontSize:11,padding:'3px 9px',borderRadius:4,background:`${p.color}22`,color:p.color,fontWeight:700}}>{p.diff}</span>
          </div>
          <p style={{fontSize:13.5,color:'rgba(255,255,255,.75)',lineHeight:1.7,marginBottom:18}}>{p.desc}</p>
          <div style={{marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.45)',marginBottom:8,letterSpacing:'.05em'}}>EXAMPLES</div>
            {p.examples.map((ex,i)=>(
              <div key={i} style={{background:'rgba(255,255,255,.04)',border:'1px solid rgba(255,255,255,.08)',borderRadius:9,padding:'13px',marginBottom:10}}>
                <div style={{fontSize:12.5,color:'rgba(255,255,255,.5)',marginBottom:4}}><strong style={{color:'rgba(255,255,255,.8)'}}>Input:</strong> {ex.input}</div>
                <div style={{fontSize:12.5,color:'rgba(255,255,255,.5)',marginBottom:4}}><strong style={{color:'rgba(255,255,255,.8)'}}>Output:</strong> {ex.output}</div>
                <div style={{fontSize:12,color:'rgba(255,255,255,.4)'}}><strong>Explanation:</strong> {ex.exp}</div>
              </div>
            ))}
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.45)',marginBottom:8,letterSpacing:'.05em'}}>CONSTRAINTS</div>
            {p.constraints.map((c,i)=>(
              <div key={i} style={{fontSize:12.5,color:'rgba(255,255,255,.5)',display:'flex',alignItems:'center',gap:7,marginBottom:5}}>
                <span style={{width:5,height:5,borderRadius:'50%',background:'#818cf8',flexShrink:0}}/>
                <code style={{fontFamily:'monospace'}}>{c}</code>
              </div>
            ))}
          </div>
        </div>
        {/* Editor */}
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          <div className="card-dark" style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
            <div style={{padding:'11px 16px',borderBottom:'1px solid rgba(255,255,255,.07)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <div style={{display:'flex',gap:6}}><span style={{width:11,height:11,borderRadius:'50%',background:'#ef4444'}}/><span style={{width:11,height:11,borderRadius:'50%',background:'#f59e0b'}}/><span style={{width:11,height:11,borderRadius:'50%',background:'#34d399'}}/></div>
              <span style={{fontSize:12,color:'rgba(255,255,255,.4)',fontFamily:'monospace'}}>Python 3</span>
            </div>
            <textarea value={code[prob]} onChange={e=>setCode({...code,[prob]:e.target.value})} spellCheck={false}
              style={{flex:1,background:'transparent',border:'none',outline:'none',color:'#e2e8f0',fontFamily:"'Fira Code','Courier New',monospace",fontSize:13.5,lineHeight:1.65,padding:'16px',resize:'none',whiteSpace:'pre'}}/>
          </div>
          <div className="card-dark" style={{padding:'14px 16px'}}>
            {results[prob]?(
              <div style={{display:'flex',alignItems:'center',gap:14}}>
                <div style={{width:36,height:36,borderRadius:'50%',background:'rgba(52,211,153,.15)',border:'2px solid rgba(52,211,153,.4)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0}}>✅</div>
                <div><div style={{fontSize:13.5,fontWeight:700,color:'#34d399',marginBottom:2}}>All Test Cases Passed!</div><div style={{fontSize:12,color:'rgba(255,255,255,.4)'}}>Runtime: {results[prob].time} · Memory: {results[prob].memory}</div></div>
              </div>
            ):(
              <div style={{fontSize:12.5,color:'rgba(255,255,255,.35)'}}>Click "Run Code" to test your solution.</div>
            )}
          </div>

              🔔<span style={{position:'absolute',top:-4,right:-4,width:15,height:15,background:'#ef4444',borderRadius:'50%',fontSize:9,fontWeight:700,display:'flex',alignItems:'center',justifyContent:'center',color:'white',border:'2px solid #0a0e28'}}>2</span>
            </button>
            <div style={{display:'flex',alignItems:'center',gap:9,padding:'5px 9px',borderRadius:9,cursor:'pointer'}}>
              <div style={{width:34,height:34,borderRadius:'50%',background:'linear-gradient(135deg,#34d399,#10b981)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              </div>
              <div><div style={{fontSize:12.5,fontWeight:600}}>Hello, Admin</div><div style={{fontSize:11,color:'rgba(255,255,255,.4)'}}>hr@company.com</div></div>
            </div>
          </div>
        </header>
        <main className="dash-main">
          {active==='overview'&&(
            <div style={{padding:'28px'}}>
              <h1 style={{fontSize:22,fontWeight:800,marginBottom:4}}>HR Dashboard 📊</h1>
              <p style={{color:'rgba(255,255,255,.45)',fontSize:13.5,marginBottom:26}}>Manage your hiring pipeline and evaluate candidates.</p>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(190px,1fr))',gap:14,marginBottom:28}}>
                {stats.map((s,i)=>(
                  <div key={i} className="card-dark" style={{padding:'18px 20px',borderTop:`3px solid ${s.c}`}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div><div style={{fontSize:22,fontWeight:800,color:s.c}}>{s.v}</div><div style={{fontSize:12.5,color:'rgba(255,255,255,.45)',marginBottom:4}}>{s.l}</div><div style={{fontSize:11,color:s.c,fontWeight:500}}>{s.d}</div></div>
                      <span style={{fontSize:26}}>{s.i}</span>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'3fr 1fr',gap:18}}>
                <div className="card-dark" style={{padding:'22px'}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}}>
                    <h3 style={{fontSize:15,fontWeight:700}}>Recent Candidates</h3>
                    <button onClick={()=>setActive('candidates')} style={{background:'none',border:'none',color:'#818cf8',fontSize:12.5,fontWeight:600,cursor:'pointer'}}>View All →</button>
                  </div>
                  {cands.map((c,i)=>(
                    <div key={i} style={{display:'flex',alignItems:'center',gap:13,padding:'11px',background:'rgba(255,255,255,.03)',borderRadius:9,border:'1px solid rgba(255,255,255,.05)',marginBottom:10,cursor:'pointer',transition:'background .2s'}}

                      onMouseLeave={e=>e.currentTarget.style.background='rgba(255,255,255,.03)'}

                      <div style={{width:36,height:36,borderRadius:'50%',background:'linear-gradient(135deg,#5b5fff,#9333ea)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'white',flexShrink:0}}>{c.a}</div>
                      <div style={{flex:1}}><div style={{fontSize:13.5,fontWeight:600}}>{c.n}</div><div style={{fontSize:11.5,color:'rgba(255,255,255,.4)'}}>{c.r}</div></div>
                      <div style={{textAlign:'right'}}><div style={{fontSize:15,fontWeight:800,color:c.s>=90?'#34d399':c.s>=80?'#f59e0b':'rgba(255,255,255,.5)'}}>{c.s}%</div><div style={{fontSize:11,fontWeight:600,color:sc[c.st]}}>{c.st}</div></div>
                    </div>
                  ))}
                </div>
                <div className="card-dark" style={{padding:'22px'}}>
                  <h3 style={{fontSize:15,fontWeight:700,marginBottom:14}}>Quick Actions</h3>
                  {[{l:'Post New Job',i:'➕',c:'#5b5fff'},{l:'View Reports',i:'📊',c:'#60a5fa'},{l:'Shortlist Candidates',i:'⭐',c:'#34d399'},{l:'Schedule Interviews',i:'📅',c:'#f59e0b'},{l:'Export Data',i:'📥',c:'#a78bfa'}].map((a,i)=>(
                    <button key={i} style={{display:'flex',alignItems:'center',gap:9,padding:'11px 13px',background:`${a.c}11`,border:`1px solid ${a.c}22`,borderRadius:9,color:'white',fontSize:13,cursor:'pointer',textAlign:'left',width:'100%',marginBottom:9,transition:'background .2s',fontWeight:500}}
                      onMouseEnter={e=>e.currentTarget.style.background=`${a.c}22`}
                      onMouseLeave={e=>e.currentTarget.style.background=`${a.c}11`}
                    ><span>{a.i}</span>{a.l}</button>
                  ))}
                </div>
              </div>
            </div>
          )}
          {active==='screening'&&<ResumeScreeningPage/>}
          {active!=='overview'&&active!=='screening'&&(
            <div style={{padding:'60px',textAlign:'center'}}>
              <div style={{fontSize:64,marginBottom:14}}>🚧</div>
              <h2 style={{fontSize:20,fontWeight:700,marginBottom:8}}>{navItems.find(n=>n.k===active)?.l||'Page'}</h2>
              <p style={{color:'rgba(255,255,255,.4)'}}>This section is coming soon.</p>
            </div>
          )}
        </main>
      </div>
    </div>
  );
};

/* ════════════════════════════════════════════
   ROOT APP — client-side router
════════════════════════════════════════════ */
const App = () => {
  const [page, setPage] = useState('landing');
  const [pageState, setPageState] = useState({});
  const [theme, setTheme] = useState('dark');

  const toggleTheme = () => {
    setTheme(t => {
      const next = t==='dark'?'light':'dark';
      document.body.className = next;
      return next;
    });
  };

  const navigate = (p, s={}) => { setPage(p); setPageState(s); window.scrollTo(0,0); };

  const pages = {
    'landing': <LandingPage navigate={navigate} theme={theme} toggleTheme={toggleTheme}/>,
    'auth': <AuthPage navigate={navigate} theme={theme} toggleTheme={toggleTheme}/>,
    'verify': <VerifyPage navigate={navigate} theme={theme} toggleTheme={toggleTheme} state={pageState}/>,
    'hr-login': <HRLoginPage navigate={navigate} theme={theme} toggleTheme={toggleTheme}/>,
    'candidate': <CandidateDash navigate={navigate}/>,
    'hr-dash': <HRDash navigate={navigate}/>,
  };

  return pages[page] || pages['landing'];
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
